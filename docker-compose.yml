services:

  # — Ollama — modelo de lenguaje con acceso a todas las GPUs
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # logging:
    #   driver: "none"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # — sage-agent — API FastAPI + Piper TTS

  ollama-init:
    image: ollama/ollama:latest
    logging:
      driver: "none"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text} &&
        ollama pull ${OLLAMA_MODEL:-llama3.2:3b} &&
        echo '[SAGE] Modelos descargados.'
      "
    restart: "no"

  piper-init:
    image: alpine:latest
    restart: "no"
    volumes:
      - piper_models:/app/piper/models
    entrypoint: >
      sh -c "
        set -e;

        apk add --no-cache wget ca-certificates;

        MODEL_DIR=/app/piper/models;
        MODEL_FILE=$$MODEL_DIR/es_AR-daniela-high.onnx;
        CONFIG_FILE=$$MODEL_DIR/es_AR-daniela-high.onnx.json;

        MODEL_URL='https://huggingface.co/rhasspy/piper-voices/resolve/refs%2Fpr%2F71/es/es_AR/daniela/high/es_AR-daniela-high.onnx';
        CONFIG_URL='https://huggingface.co/rhasspy/piper-voices/resolve/refs%2Fpr%2F71/es/es_AR/daniela/high/es_AR-daniela-high.onnx.json';

        mkdir -p $$MODEL_DIR;

        if [ ! -f $$MODEL_FILE ]; then
          echo '[PIPER INIT] Descargando modelo Piper...';
          wget -O $$MODEL_FILE $$MODEL_URL;
        else
          echo '[PIPER INIT] Modelo Piper ya existe.';
        fi;

        if [ ! -f $$CONFIG_FILE ]; then
          echo '[PIPER INIT] Descargando config Piper...';
          wget -O $$CONFIG_FILE $$CONFIG_URL;
        else
          echo '[PIPER INIT] Config Piper ya existe.';
        fi;

        echo '[PIPER INIT] Piper listo.';
      "

  sage-agent:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - START_OLLAMA=false
      - PIPER_BIN=/app/piper/piper/piper
      - PIPER_MODEL=/app/piper/models/es_AR-daniela-high.onnx
      - SAGE_DATA_DIR=/app/data
    volumes:
      - piper_models:/app/piper/models
      - sage_data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      piper-init:
        condition: service_completed_successfully

volumes:
  ollama_models:
  piper_models:
  sage_data:

  